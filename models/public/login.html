<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallDesk — Login</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Outfit", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      margin-bottom: 20px;
    }

    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .logo-text {
      font-family: "Bebas Neue", sans-serif;
      font-size: 28px;
      font-weight: bold;
      color: #333;
      letter-spacing: 1px;
    }

    .logo-text span {
      color: #667eea;
    }

    .auth-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      background: #f5f5f5;
      border-radius: 8px;
      padding: 4px;
    }

    .toggle-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #666;
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .toggle-btn.active {
      background: white;
      color: #667eea;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    .form-title {
      font-size: 20px;
      font-weight: 700;
      color: #333;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e5e5e5;
      border-radius: 8px;
      font-family: "Outfit", sans-serif;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 24px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .form-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #666;
    }

    .form-footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      border-left: 4px solid #c33;
    }

    .success {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      border-left: 4px solid #3c3;
    }

    .info-box {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 14px;
      border-radius: 6px;
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">
      <div class="logo-section">
        <div class="logo-icon">🎧</div>
        <div class="logo-text">Call<span>Desk</span></div>
      </div>

      <!-- Auth Toggle -->
      <div class="auth-toggle">
        <button class="toggle-btn active" onclick="switchForm('login', this)">Login</button>
        <button class="toggle-btn" onclick="switchForm('register', this)">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form" class="form-section active">
        <div class="info-box">
          👤 Login as Customer or Developer to access the queue system.
        </div>

        <h2 class="form-title">Welcome Back</h2>

        <div id="login-error"></div>

        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>

          <button type="submit" class="submit-btn">🔓 Login</button>
        </form>

        <div class="form-footer">
          Don't have an account? <a onclick="switchForm('register', this)">Register here</a>
        </div>
      </div>

      <!-- REGISTER FORM -->
      <div id="register-form" class="form-section">
        <h2 class="form-title">Create Account</h2>

        <div id="register-error"></div>

        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="register-name" placeholder="Your Full Name" required>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="register-email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="register-phone" placeholder="+91 98XXXXXXXX">
          </div>

          <div class="form-group">
            <label>Account Type</label>
            <select id="register-role" required>
              <option value="">Select Account Type</option>
              <option value="customer">👤 Customer - Register Complaint</option>
              <option value="developer">👨‍💼 Developer - Handle Complaints</option>
            </select>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="register-password" placeholder="••••••••" required>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="register-confirm" placeholder="••••••••" required>
          </div>

          <button type="submit" class="submit-btn">✨ Create Account</button>
        </form>

        <div class="form-footer">
          Already have an account? <a onclick="switchForm('login', this)">Login here</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API = 'http://localhost:3000/api';

    function switchForm(form, button) {
      document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));

      document.getElementById(`${form}-form`).classList.add('active');
      if (button) button.classList.add('active');

      // Clear messages
      document.getElementById('login-error').innerHTML = '';
      document.getElementById('register-error').innerHTML = '';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('login-error');
      const btn = event.target.querySelector('button');

      btn.classList.add('loading');
      btn.textContent = '🔄 Logging in...';

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          // Redirect based on role
          const role = data.user.role;
          setTimeout(() => {
            window.location.href = role === 'developer' ? '/queue.html' : '/customer.html';
          }, 500);
        } else {
          errorDiv.innerHTML = `<div class="error">❌ ${data.message}</div>`;
        }
      } catch (err) {
        errorDiv.innerHTML = `<div class="error">❌ Connection error. Make sure server is running.</div>`;
      } finally {
        btn.classList.remove('loading');
        btn.textContent = '🔓 Login';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('register-name').value;
      const email = document.getElementById('register-email').value;
      const phone = document.getElementById('register-phone').value;
      const role = document.getElementById('register-role').value;
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;
      const errorDiv = document.getElementById('register-error');
      const btn = event.target.querySelector('button');

      if (password !== confirm) {
        errorDiv.innerHTML = `<div class="error">❌ Passwords do not match</div>`;
        return;
      }

      if (password.length < 6) {
        errorDiv.innerHTML = `<div class="error">❌ Password must be at least 6 characters</div>`;
        return;
      }

      btn.classList.add('loading');
      btn.textContent = '🔄 Creating account...';

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, role, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          const role = data.user.role;
          setTimeout(() => {
            window.location.href = role === 'developer' ? '/queue.html' : '/customer.html';
          }, 500);
        } else {
          errorDiv.innerHTML = `<div class="error">❌ ${data.message}</div>`;
        }
      } catch (err) {
        errorDiv.innerHTML = `<div class="error">❌ Connection error. Make sure server is running.</div>`;
      } finally {
        btn.classList.remove('loading');
        btn.textContent = '✨ Create Account';
      }
    }

    // Check if already logged in
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token');
      const user = localStorage.getItem('user');
      
      if (token && user) {
        const role = JSON.parse(user).role;
        window.location.href = role === 'developer' ? '/queue.html' : '/customer.html';
      }
    });
  </script>

</body>
</html>
